apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: carts-network-delay
  namespace: sock-shop
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - sock-shop
    labelSelectors:
      name: carts
  delay:
    latency: "200ms"
    correlation: "50"
    jitter: "20ms"
  direction: to
  duration: "5m"