apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-cart
  namespace: chaos-mesh
spec:
  action: delay
  direction: to
  mode: one
  selector:
    namespaces:
    - hipster
    labelSelectors:
      app: cartservice
  delay:
    latency: "3000ms"
    correlation: "100"
    jitter: "0ms"
  duration: "360s"
