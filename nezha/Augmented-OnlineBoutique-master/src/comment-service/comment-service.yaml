apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: hipster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
      - name: server
        image: comment-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: comment-service
  namespace: hipster
spec:
  type: ClusterIP
  selector:
    app: comment-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
