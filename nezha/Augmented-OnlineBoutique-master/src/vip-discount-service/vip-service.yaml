# 第一部分：Deployment (告诉 K8s 如何运行你的容器)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vip-discount-service
  namespace: hipster   # 必须指定部署在 hipster 房间！
spec:
  replicas: 1          # 运行 1 个实例
  selector:
    matchLabels:
      app: vip-discount-service
  template:
    metadata:
      labels:
        app: vip-discount-service
    spec:
      containers:
      - name: server
        image: vip-discount-service:v1
        # 【关键点】告诉 K8s 优先使用本地刚才打包的镜像，不要去网上瞎下载！
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 8080

---
# 第二部分：Service (给你的容器分配一个集群内部的固定网络地址)
apiVersion: v1
kind: Service
metadata:
  name: vip-discount-service
  namespace: hipster
spec:
  type: ClusterIP      # 集群内网服务
  selector:
    app: vip-discount-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080